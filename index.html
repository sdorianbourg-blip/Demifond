<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>⏱ Demi-fond EPS</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        /* Styles conservés et optimisés */
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
        html,body{height:100%;font-family:-apple-system,system-ui,'Helvetica Neue',sans-serif;background:#f1f5f9;color:#0f172a;overscroll-behavior:none}
        #app{display:flex;flex-direction:column;height:100%;max-width:640px;margin:0 auto}
        #main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(env(safe-area-inset-bottom)+4px)}
        nav{display:flex;background:#1e293b;border-top:1px solid #334155;padding-bottom:env(safe-area-inset-bottom);flex-shrink:0}
        .nav-btn{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;gap:3px;font-family:inherit;color:#64748b;border-top:2px solid transparent;font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
        .nav-btn.active{color:#34d399;border-top-color:#34d399}
        .nav-icon{font-size:20px;line-height:1}
        .hdr{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;min-height:54px}
        .hdr-title{font-size:19px;font-weight:700}
        .sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:8px;vertical-align:middle}
        .sync-ok{background:#22c55e}
        .sync-wait{background:#f59e0b;animation:pulse 1s infinite}
        .sync-err{background:#ef4444}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .back-bar{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 16px;display:flex;align-items:center;gap:8px;min-height:52px}
        .back-btn{border:none;background:none;color:#3b82f6;font-size:15px;cursor:pointer;padding:4px 0;font-family:inherit;font-weight:500;white-space:nowrap}
        .back-title{font-weight:700;font-size:15px;text-align:center;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .sec{padding:14px 16px}
        .lbl{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
        .card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
        .card-title{font-weight:700;font-size:15px}
        .card-sub{font-size:12px;color:#94a3b8;margin-top:3px}
        .input{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:16px;font-family:inherit;color:#0f172a;background:#fff;outline:none}
        .input-row{display:flex;gap:8px}
        .btn-p{background:#3b82f6;color:#fff;border:none;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer}
        .btn-s{background:#f1f5f9;color:#475569;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;cursor:pointer}
        .btn-d{background:#fff;color:#ef4444;border:1.5px solid #fecaca;border-radius:10px;padding:10px 12px;font-size:14px;cursor:pointer}
        .btn-start{width:100%;height:64px;background:#16a34a;color:#fff;border:none;border-radius:16px;font-size:20px;font-weight:800;cursor:pointer}
        .status-bar{margin:10px 12px;background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:14px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
        .elapsed{font-family:monospace;font-size:18px;font-weight:700;color:#15803d}
        #loading-screen{position:fixed;inset:0;background:#f1f5f9;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100}
        .spinner{width:40px;height:40px;border:4px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .tab-pill{padding:7px 16px;border-radius:20px;border:2px solid #e2e8f0;background:#fff;cursor:pointer;font-size:14px;font-weight:700;white-space:nowrap;color:#64748b}
        .tab-pill.active{color:#fff;border-color:transparent}
        .tab-strip{display:flex;gap:8px;padding:9px 12px;overflow-x:auto;background:#f8fafc;border-bottom:1px solid #e2e8f0}
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="spinner"></div>
    <div class="load-txt">Initialisation...</div>
</div>

<div id="app" style="display:none">
    <main id="main"></main>
    <nav>
        <button class="nav-btn active" data-tab="classes" onclick="switchTab('classes')"><span class="nav-icon">👥</span>Classes</button>
        <button class="nav-btn" data-tab="lessons" onclick="switchTab('lessons')"><span class="nav-icon">📋</span>Leçons</button>
        <button class="nav-btn" data-tab="chrono" onclick="switchTab('chrono')"><span class="nav-icon">⏱</span>Chrono</button>
    </nav>
</div>

<script>
/* ── CONFIGURATION & STATE ── */
const firebaseConfig = {
    apiKey: "AIzaSyDtVm174KfjK5RijugtFZnSIJiPzRKTqAA",
    authDomain: "demifond-9858b.firebaseapp.com",
    projectId: "demifond-9858b",
    storageBucket: "demifond-9858b.firebasestorage.app",
    messagingSenderId: "282652673011",
    appId: "1:282652673011:web:f17bf67481dbf0e52bc886",
    databaseURL: "https://demifond-9858b-default-rtdb.firebaseio.com/"
};

let DB = null;
let syncStatus = 'ok';
let S = {
    tab: 'classes', 
    clsScreen: 'list', 
    clsDetail: null, 
    lesScreen: 'list', 
    lesEditing: null,
    chrScreen: 'pick', 
    chrLessonId: null, 
    chrGroupId: null, 
    chrRunIdx: 0, 
    chrView: 'timing',
    classes: [], 
    lessons: [], 
    sessions: {}
};

/* ── UTILS ── */
const uid = () => Math.random().toString(36).slice(2, 9);
const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const GRPS = ['A', 'B', 'C', 'D', 'E'];
const GCOL = ['#3b82f6', '#ef4444', '#22c55e', '#f59e0b', '#a855f7'];
const GLGT = ['#eff6ff', '#fef2f2', '#f0fdf4', '#fffbeb', '#faf5ff'];
const GBDR = ['#bfdbfe', '#fecaca', '#bbf7d0', '#fde68a', '#e9d5ff'];

/* ── PERSISTENCE ENGINE ── */
function saveLocal() {
    localStorage.setItem('df_data', JSON.stringify({
        classes: S.classes,
        lessons: S.lessons,
        sessions: S.sessions
    }));
}

function loadLocal() {
    const raw = localStorage.getItem('df_data');
    if (raw) {
        const d = JSON.parse(raw);
        S.classes = d.classes || [];
        S.lessons = d.lessons || [];
        S.sessions = d.sessions || {};
        return true;
    }
    return false;
}

async function initFirebase() {
    try {
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
            DB = firebase.database();
            
            // Sync avec Firebase en arrière-plan
            DB.ref('/eps').on('value', (snap) => {
                if (snap.exists()) {
                    const data = snap.val();
                    S.classes = Object.values(data.classes || {});
                    S.lessons = Object.values(data.lessons || {});
                    S.sessions = data.sessions || {};
                    saveLocal();
                    render();
                    setSyncStatus('ok');
                }
            });
        }
    } catch (e) {
        console.error("Firebase fail", e);
        setSyncStatus('err');
    }
}

function fbSave(path, data) {
    saveLocal(); 
    if (!DB) return;
    setSyncStatus('wait');
    DB.ref(path).set(data)
        .then(() => setSyncStatus('ok'))
        .catch(() => setSyncStatus('err'));
}

/* ── UI CORE ── */
function setSyncStatus(st) {
    syncStatus = st;
    const dot = document.getElementById('sync-dot');
    if (dot) dot.className = `sync-dot sync-${st}`;
}

function switchTab(tab) {
    S.tab = tab;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    render();
}

/* ── RENDERING ── */
function render() {
    const m = document.getElementById('main');
    if (!m) return;
    if (S.tab === 'classes') renderClasses(m);
    else if (S.tab === 'lessons') renderLessons(m);
    else renderChrono(m);
}

function renderClasses(m) {
    if (S.clsScreen === 'detail') { renderClassDetail(m); return; }
    m.innerHTML = `
        <div class="hdr"><span class="hdr-title">Classes <span id="sync-dot" class="sync-dot sync-${syncStatus}"></span></span></div>
        <div class="sec">
            <div class="lbl">Nouvelle classe</div>
            <div class="input-row">
                <input class="input" id="new-cls-name" placeholder="Ex: 3ème B">
                <button class="btn-p" onclick="addClass()">Ajouter</button>
            </div>
        </div>
        <div id="cls-list" style="padding:0 12px"></div>`;
    
    const list = document.getElementById('cls-list');
    list.innerHTML = S.classes.map(c => `
        <div class="card" onclick="openClass('${c.id}')">
            <div style="flex:1"><div class="card-title">${esc(c.name)}</div></div>
            <button class="btn-d" onclick="event.stopPropagation();deleteClass('${c.id}')">✕</button>
        </div>
    `).join('') || '<div class="empty">Aucune classe</div>';
}

function addClass() {
    const n = document.getElementById('new-cls-name').value.trim();
    if (!n) return;
    const newCls = { id: uid(), name: n, students: [] };
    S.classes.push(newCls);
    fbSave('/eps/classes', S.classes);
    render();
}

function deleteClass(id) {
    if(!confirm('Supprimer ?')) return;
    S.classes = S.classes.filter(c => c.id !== id);
    fbSave('/eps/classes', S.classes);
    render();
}

function openClass(id) { S.clsScreen = 'detail'; S.clsDetail = id; render(); }

function renderClassDetail(m) {
    const cls = S.classes.find(c => c.id === S.clsDetail);
    m.innerHTML = `
        <div class="back-bar">
            <button class="back-btn" onclick="S.clsScreen='list';render()">← Retour</button>
            <span class="back-title">${esc(cls.name)}</span>
        </div>
        <div class="sec">
            <div class="lbl">Ajouter un élève</div>
            <div class="input-row">
                <input class="input" id="new-stu-name" placeholder="Nom Prénom">
                <button class="btn-p" onclick="addStudent()">+</button>
            </div>
        </div>
        <div id="stu-list" style="padding:0 12px"></div>`;
    
    document.getElementById('stu-list').innerHTML = cls.students.map(s => `
        <div class="card" style="padding:10px 16px">
            <div style="flex:1">${esc(s.name)}</div>
            <button class="btn-d" onclick="deleteStudent('${s.id}')">✕</button>
        </div>
    `).join('');
}

function addStudent() {
    const cls = S.classes.find(c => c.id === S.clsDetail);
    const n = document.getElementById('new-stu-name').value.trim();
    if (!cls || !n) return;
    cls.students.push({ id: uid(), name: n });
    fbSave('/eps/classes', S.classes);
    render();
}

/* ── LESSONS & CHRONO (Simplifiés pour l'exemple) ── */
function renderLessons(m) {
    m.innerHTML = `<div class="hdr"><span class="hdr-title">Leçons</span></div><div class="sec">Gestion des leçons ici...</div>`;
}

function renderChrono(m) {
    m.innerHTML = `<div class="hdr"><span class="hdr-title">Chrono</span></div><div class="sec">Sélectionnez une leçon pour démarrer.</div>`;
}

/* ── BOOTSTRAP ── */
window.onload = async () => {
    loadLocal(); // On charge le local de suite
    render();    // On affiche l'interface vide ou locale
    
    document.getElementById('app').style.display = 'flex';
    document.getElementById('loading-screen').style.display = 'none';
    
    await initFirebase(); // Puis on connecte Firebase
};
</script>
</body>
</html>
